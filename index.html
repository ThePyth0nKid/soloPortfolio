<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Chen — Solo Founder</title>
    <script>
      // Inline theme bootstrapper — runs before React hydrates to prevent
      // a flash of incorrect theme (FOIT). Kept minimal and sandboxed; only
      // ever reads/writes a strictly validated 'light'|'dark' string.
      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem('theme'); } catch (e) {}
          var valid = stored === 'light' || stored === 'dark';
          var theme;
          if (valid) {
            theme = stored;
          } else {
            var prefersDark = false;
            try {
              prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            } catch (e) {}
            theme = prefersDark ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) { /* non-fatal */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
