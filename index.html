<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Chen — Solo Founder</title>
    <script>
      // Inline theme bootstrap to prevent FOUC (flash of wrong theme).
      // Security: strict allowlist, length cap, try/catch. No innerHTML, no eval.
      (function () {
        try {
          var raw = null;
          try { raw = window.localStorage.getItem('theme-preference'); } catch (_) {}
          var theme = null;
          if (typeof raw === 'string' && raw.length <= 16 && (raw === 'light' || raw === 'dark')) {
            theme = raw;
          }
          if (!theme) {
            var prefersDark = false;
            try {
              prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            } catch (_) {}
            theme = prefersDark ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (_) { /* fail open to light theme */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
